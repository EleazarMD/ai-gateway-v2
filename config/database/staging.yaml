# Staging Environment Database Configuration
# AWS RDS PostgreSQL or equivalent cloud database

provider: postgresql
host: ${DATABASE_HOST}
port: 5432
database: ai_gateway_staging
user: ${DATABASE_USER}
password: ${DATABASE_PASSWORD}

ssl:
  rejectUnauthorized: true

pool:
  min: 5
  max: 15
  idleTimeoutMillis: 30000
  connectionTimeoutMillis: 10000

# Staging-specific settings
failover: false
readReplica: null

# Security and monitoring
logQueries: false
logConnections: true
enableMetrics: true
