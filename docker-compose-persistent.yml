version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-gateway-postgres
    environment:
      POSTGRES_DB: aigateway_db
      POSTGRES_USER: aigateway
      POSTGRES_PASSWORD: aigateway_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - ai-gateway-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigateway -d aigateway_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai-gateway-redis
    ports:
      - "6380:6379"
    volumes:
      - ai-gateway-redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  ai-gateway-postgres-data:
    external: true
  ai-gateway-redis-data:
    external: true
